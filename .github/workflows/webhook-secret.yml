name: 🔐 Webhook-Secret einrichten

# Einmaliger Setup-Lauf: generiert ein zufälliges Webhook-Secret, registriert es
# bei Telegram (secret_token) und hinterlegt es als Worker-Secret. Reihenfolge
# ist wichtig: erst Telegram, dann Worker – der Worker erzwingt den Header erst,
# sobald TELEGRAM_WEBHOOK_SECRET gesetzt ist → kein Ausfall dazwischen.

on:
  workflow_dispatch:

jobs:
  setup:
    name: Webhook-Secret setzen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret generieren, Telegram + Worker konfigurieren
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          SECRET=$(openssl rand -hex 32)
          echo "::add-mask::$SECRET"

          echo "1/3 Telegram-Webhook mit secret_token registrieren…"
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -d "url=https://schul-bot.sabesis.workers.dev" \
            -d "secret_token=${SECRET}" | grep -o '"ok":[a-z]*'

          echo "2/3 Worker-Secret TELEGRAM_WEBHOOK_SECRET setzen…"
          echo "$SECRET" | npx wrangler@4 secret put TELEGRAM_WEBHOOK_SECRET

          echo "3/3 Kontrolle (getWebhookInfo):"
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo" \
            | grep -o '"url":"[^"]*"\|"pending_update_count":[0-9]*\|"last_error_message":"[^"]*"' || true
