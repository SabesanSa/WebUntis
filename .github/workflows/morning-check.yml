name: 🌅 Schul-Check

on:
  schedule:
    # 4:30 UTC = 6:30 MESZ (Sommer) / 5:30 MEZ (Winter) – Mo bis Fr
    - cron: "30 4 * * 1-5"
  workflow_dispatch: # manuell auslösbar zum Testen

jobs:
  schul-check:
    name: Schul-Check senden
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - name: 🌅 Schul-Check ausführen
        env:
          NOTION_TOKEN:             ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID:       ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_TODO_DATABASE_ID:  ${{ secrets.NOTION_TODO_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node morning-check.js
