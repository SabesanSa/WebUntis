name: Stundenplan Sync

on:
  # Cron deaktiviert – Stundenplan läuft jetzt direkt über WebUntis (Railway), nicht mehr über Notion. Nur noch manuell.
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package.json') }}

      - run: npm install

      - run: npx playwright install chromium --with-deps

      - run: node sync.js
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          ISERV_USER: ${{ secrets.ISERV_USER }}
          ISERV_PASS: ${{ secrets.ISERV_PASS }}
