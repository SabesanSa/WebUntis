name: 📖 Hausaufgaben-Reminder

on:
  # Cron deaktiviert – ersetzt durch Railway-Checks. Nur noch manuell.
  workflow_dispatch:

jobs:
  hausaufgaben-reminder:
    name: Hausaufgaben-Reminder senden
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm install

      - name: 📖 Hausaufgaben-Reminder ausführen
        env:
          NOTION_TOKEN:            ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID:      ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_TODO_DATABASE_ID: ${{ secrets.NOTION_TODO_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_EVENT_NAME:       ${{ github.event_name }}
        run: node homework-reminder.js
