name: Moodle Check

on:
  schedule:
    - cron: '0 6 * * 1-5'    # Mo–Fr 7:00 Uhr
    - cron: '0 11 * * 1-5'   # Mo–Fr 12:00 Uhr
  workflow_dispatch:

jobs:
  moodle-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4 google-auth google-api-python-client

      - name: Bekannte Dateien laden
        uses: actions/cache@v4
        with:
          path: moodle_known_files.json
          key: moodle-known-${{ github.run_id }}
          restore-keys: moodle-known-

      - name: Moodle-Check ausführen
        env:
          MOODLE_USERNAME:           ${{ secrets.MOODLE_USERNAME }}
          MOODLE_PASSWORD:           ${{ secrets.MOODLE_PASSWORD }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_ROOT_FOLDER_ID:      ${{ secrets.DRIVE_ROOT_FOLDER_ID }}
        run: python moodle-check.py
