name = "schul-bot"
main = "telegram-bot-worker.js"
compatibility_date = "2025-01-01"

# Durable Object für Moodle-Anfragen – per locationHint 'weur' in Westeuropa
# gepinnt, damit der Egress zum Schulserver aus einem EU-Colo kommt
# (US-Colos werden vom Schulserver mit 522 geblockt).
[[durable_objects.bindings]]
name = "MOODLE_DO"
class_name = "MoodleDO"

# SQLite-Backend → nötig damit DOs auch im kostenlosen Workers-Plan laufen
[[migrations]]
tag = "v1"
new_sqlite_classes = ["MoodleDO"]

# KV-Namespace für Moodle-Session-Cache
# Nach "wrangler kv:namespace create moodle_session" ausführen:
# Die ausgegebene ID hier eintragen.
[[kv_namespaces]]
binding = "MOODLE_KV"
id = "4af93a5a16cd4daa92e3bfdc64d47878"

# Öffentliche Variablen (kein Geheimnis)
[vars]
MOODLE_URL = "https://dortmund.abitur-online.net"

# Geheime Variablen müssen per CLI gesetzt werden:
#   wrangler secret put MOODLE_USERNAME
#   wrangler secret put MOODLE_PASSWORD
#   wrangler secret put WORKER_KEY
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_CHAT_ID
#   wrangler secret put NOTION_TOKEN
#   wrangler secret put NOTION_DATABASE_ID
#   wrangler secret put GOOGLE_SERVICE_ACCOUNT_JSON
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put GITHUB_USERNAME
